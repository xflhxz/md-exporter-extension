<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Export Markdown</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #22263a;
      --border: #2a2f4a;
      --accent: #7c6af7;
      --accent-hover: #9d8fff;
      --text: #e2e4f0;
      --text-muted: #6b7094;
      --success: #3ecf8e;
      --error: #f56565;
      --tag-bg: #1e2235;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 300px;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 18px;
    }

    .header-icon {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .header-text .sub {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 1px;
    }

    /* ── Options ── */
    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    .option-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .option-row:hover {
      border-color: var(--accent);
    }

    .option-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    .option-icon { font-size: 15px; }

    /* Toggle switch */
    .toggle {
      position: relative;
      width: 34px;
      height: 18px;
      flex-shrink: 0;
    }

    .toggle input { opacity: 0; width: 0; height: 0; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 9px;
      transition: background 0.2s;
    }

    .toggle input:checked + .toggle-track {
      background: var(--accent);
    }

    .toggle-thumb {
      position: absolute;
      top: 2px;
      left: 2px;
      width: 14px;
      height: 14px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(16px);
    }

    /* ── Scope selector ── */
    .scope-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .scope-tab {
      flex: 1;
      padding: 6px 0;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }

    .scope-tab.active {
      background: var(--accent);
      color: white;
      font-weight: 500;
    }

    /* ── Export button ── */
    .export-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      letter-spacing: 0.01em;
    }

    .export-btn:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(124,106,247,0.35);
    }

    .export-btn:active {
      transform: translateY(0);
      box-shadow: none;
    }

    .export-btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    /* ── Status ── */
    .status-bar {
      margin-top: 12px;
      min-height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-muted);
      border-radius: 6px;
    }

    .status-bar.success {
      color: var(--success);
    }

    .status-bar.error {
      color: var(--error);
    }

    .status-bar.loading {
      color: var(--text-muted);
    }

    /* Spinner */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 13px;
      height: 13px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* ── Stats chip ── */
    .stats {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .chip {
      font-size: 10px;
      color: var(--text-muted);
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
    }

    /* Shortcut hint */
    .shortcut-hint {
      margin-top: 14px;
      text-align: center;
      font-size: 10px;
      color: var(--text-muted);
    }

    .shortcut-hint kbd {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 10px;
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 14px 0;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">📄</div>
    <div class="header-text">
      <h1>Page to Markdown</h1>
      <div class="sub">Export any webpage to Markdown</div>
    </div>
  </div>

  <!-- Scope tabs -->
  <div class="section-label">Scope</div>
  <div class="scope-tabs" id="scopeTabs">
    <button class="scope-tab active" data-scope="page">Full Page</button>
    <button class="scope-tab" data-scope="selection">Selection</button>
  </div>

  <!-- Options -->
  <div class="section-label">Options</div>
  <div class="options">
    <label class="option-row">
      <span class="option-label">
        <span class="option-icon">📋</span>
        <span>YAML Front Matter</span>
      </span>
      <span class="toggle">
        <input type="checkbox" id="optFrontMatter" checked>
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>

    <label class="option-row">
      <span class="option-label">
        <span class="option-icon">🖼️</span>
        <span>Include Images</span>
      </span>
      <span class="toggle">
        <input type="checkbox" id="optImages" checked>
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>

    <label class="option-row">
      <span class="option-label">
        <span class="option-icon">🔗</span>
        <span>Include Links</span>
      </span>
      <span class="toggle">
        <input type="checkbox" id="optLinks" checked>
        <span class="toggle-track"></span>
        <span class="toggle-thumb"></span>
      </span>
    </label>
  </div>

  <hr class="divider">

  <!-- Export button -->
  <button class="export-btn" id="exportBtn">
    <span id="btnIcon">⬇️</span>
    <span id="btnText">Export Markdown</span>
  </button>

  <!-- Status -->
  <div class="status-bar" id="statusBar"></div>

  <!-- Stats -->
  <div class="stats" id="statsArea" style="display:none">
    <span class="chip" id="charCount"></span>
    <span class="chip" id="filenameChip"></span>
  </div>

  <!-- Shortcut hint -->
  <div class="shortcut-hint">
    Shortcut: <kbd>Alt+Shift+M</kbd> &nbsp;·&nbsp; Right-click menu supported
  </div>

  <script src="popup.js"></script>
</body>
</html>
